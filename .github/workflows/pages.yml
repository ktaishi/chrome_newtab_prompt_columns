# Build PRIVACY.md into a GitHub Pages site (Jekyll).
# Published URL: https://ktaishi.github.io/chrome_newtab_prompt_columns/privacy/
#
# After first push: GitHub → Settings → Pages → Source: GitHub Actions

name: Deploy GitHub Pages

on:
  push:
    branches: ["main", "master"]
    paths:
      - "PRIVACY.md"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare privacy page from PRIVACY.md
        run: |
          mkdir -p docs/privacy
          {
            echo "---"
            echo "layout: default"
            echo "title: Privacy Policy"
            echo "permalink: /privacy/"
            echo "---"
            echo ""
            cat PRIVACY.md
          } > docs/privacy/index.md

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
